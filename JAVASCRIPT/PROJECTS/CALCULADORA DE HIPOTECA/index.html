<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="style.css">
    <title>Calculadora de Hipoteca</title>
</head>

<body>
    <div id="container">
        <h1>Calculadora de Hipoteca</h1>
        <label for="loanAmount">Valor do Empréstimo (R$):</label>
        <input type="number" id="loanAmount" step="1000">

        <label for="interestRate">Taxa de Juros Anual (%):</label>
        <input type="number" id="interestRate" step="0.01">

        <label for="loanTerm">Prazo do Empréstimo (Anos):</label>
        <input type="number" id="loanTerm" step="1">

        <button onclick="calculateMonthlyPayment()">Calcular</button>

        <div id="result"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
