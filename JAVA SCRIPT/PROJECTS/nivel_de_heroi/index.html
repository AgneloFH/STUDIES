<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <title>Classificador de Nível de Herói</title>
</head>
<body>
  <main class="container-main">
    <h1>Classificador de Nível de Herói</h1>

    <form id="hero_form">
      <label for="nome_heroi">Nome do Herói:</label>
      <input type="text" id="nome_heroi" required>

      <label for="xp_heroi">XP do Herói:</label>
      <input type="number" id="xp_heroi" oninput="atualizarNivel()" required>

      <button type="button" onclick="classificar_heroi()">Classificar</button>
    </form>

    <div id="resultado"></div>
  </main>
  
  <script src="src/script.js"></script>  
</body>
</html>
